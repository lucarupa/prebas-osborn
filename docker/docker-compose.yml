

services:
  db:
    image: postgres:16.3-alpine
    restart: always
    env_file:
      - .env-postgres
    ports:
      - "5434:5432"
    volumes:
      - ../postgres_data:/var/lib/postgresql/data
      - ../sql/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defaultuser -d asset_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "3000:8000"
    depends_on:
     db:
      condition: service_healthy